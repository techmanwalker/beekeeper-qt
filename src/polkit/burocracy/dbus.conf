<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- SELinux context association -->
  <selinux>
    <associate own="org.beekeeper.dbush" context="system_u:system_r:beekeeper_t:s0"/>
  </selinux>
  
  <policy user="root">
    <allow own="org.beekeeper.dbush"/>
    <allow send_destination="org.beekeeper.dbush"/>
    <allow receive_sender="org.beekeeper.dbush"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.beekeeper.dbush"/>
    <allow send_interface="org.beekeeper.dbush"/>
    <allow receive_sender="org.beekeeper.dbush"/>
    <allow receive_interface="org.beekeeper.dbush"/>
  </policy>

  <!-- SELinux-specific policies -->
  <policy selinux="beekeeper_t">
    <allow own="org.beekeeper.dbush"/>
    <allow send_destination="*"/>
    <allow receive_sender="*"/>
  </policy>

  <policy selinux="unconfined_t">
    <allow send_destination="org.beekeeper.dbush"/>
    <allow receive_sender="org.beekeeper.dbush"/>
  </policy>
</busconfig>